# BusinesAIOS API/status nginx contract template.
# Replace certificate paths with the active certificate directory on the host.

server {
    listen 80;
    server_name api.businessaios.ru status.businessaios.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.businessaios.ru status.businessaios.ru;

    # ssl_certificate <active-fullchain-path>;
    # ssl_certificate_key <active-privkey-path>;

    include /etc/nginx/snippets/businesaios-block-noise-scans.conf;

    location /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
