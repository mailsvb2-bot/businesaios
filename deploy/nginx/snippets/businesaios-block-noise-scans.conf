# Reject common opportunistic probe paths before they reach FastAPI logs.
# Keep this snippet inside the api/status server block.
location ~* ^/(owa|ews|ecp|mapi|rpc)(/|$) {
    access_log off;
    return 404;
}

location ~* ^/(autodiscover|Autodiscover)(/|$) {
    access_log off;
    return 404;
}

location = /Microsoft-Server-ActiveSync {
    access_log off;
    return 404;
}
