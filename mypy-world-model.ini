[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_unreachable = True
strict_equality = True

[mypy-runtime.boot.world_model_contract]
strict = True

[mypy-runtime.boot.canonical_decision_world_model]
strict = True

[mypy-runtime.boot.world_model_builder]
strict = True

[mypy-runtime.boot.world_model_boot_check]
strict = True

[mypy-runtime.boot.world_model_self_check]
strict = True

[mypy-runtime.boot.world_model_forbidden_paths]
strict = True

[mypy-application.decision_state.world_model_metadata]
strict = True

[mypy-kernel.world_model_pin]
strict = True

[mypy-application.decision_state.world_model_replay]
strict = True

[mypy-runtime.enforcement.world_model_pin_guard]
strict = True

[mypy-runtime.events.world_model_events]
strict = True
