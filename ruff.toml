target-version = "py311"
line-length = 120

[lint]
# Start conservative, expand over time.
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "T20",  # flake8-print (catch debug prints)
]
ignore = [
    "E501",   # line too long (пока не форсируем)
    "E741",   # ambiguous variable name
    "B904",   # raise without from (слишком много мест)
    "SIM108", # ternary (стиль)
]

[lint.per-file-ignores]
"tests/*" = ["B", "SIM", "T20"]
"scripts/*" = ["T20"]

[format]
quote-style = "double"
indent-style = "space"
