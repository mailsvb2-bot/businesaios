apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-fqdn-only
  namespace: businesaios
spec:
  endpointSelector:
    matchLabels:
      app: runtime
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toFQDNs:
        - matchName: api.yookassa.ru
        - matchName: yookassa.ru
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
