contract_id: autopilot_default@v1
north_star_metric: profit
constraints:
  max_price_changes_per_day: 1
  cooldown_hours: 24
  daily_budget_minor: 0
  currency: RUB
data_requirements:
  required_event_types:
    - lead_created@v1
    - purchase_completed@v1
  optional_event_types:
    - offer_shown@v1
    - offer_accepted@v1
safety_policy:
  stop_loss_max_cac_minor: 20000
  stop_loss_min_profit_minor: -2000
  stop_loss_cac_days: 1
  stop_loss_profit_days: 1
  stop_loss_max_spend_minor_no_conv: 3000
  stop_loss_no_conv_days: 1
  allow_channels:
    - internal
control_surface:
  can_change_offer: true
  can_change_price: true
  can_change_copy: true
  can_change_frequency: true
metadata:
  description: "Default Autopilot contract for One-Button Profit (7 days)."
