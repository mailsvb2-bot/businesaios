name: release
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify transitive release dependency lock
        run: BAIOS_REQUIRE_TRANSITIVE_DEPENDENCY_LOCK=1 python scripts/ci/check_requirements_lock.py
      - run: python -m pip install --upgrade pip
      - name: Install hash-pinned release dependencies
        run: python -m pip install --require-hashes -r requirements.release.lock.txt
      - run: python -m scripts.ci.cli --gate release
