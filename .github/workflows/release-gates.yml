name: Release Gates

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify transitive release dependency lock
        run: BAIOS_REQUIRE_TRANSITIVE_DEPENDENCY_LOCK=1 python scripts/ci/check_requirements_lock.py
      - name: Install hash-pinned release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.release.lock.txt
      - name: Run canonical release gate
        run: python -m scripts.ci.cli --gate release
