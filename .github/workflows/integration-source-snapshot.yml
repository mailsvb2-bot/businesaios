name: integration-source-snapshot

on:
  push:
    branches:
      - agent/canon-no-second-brain-evidence-closure

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Verify exact checkout
        run: test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
      - name: Pack integration sources
        run: tar -czf integration-source-snapshot.tar.gz tests/integration tests/runtime tests/interfaces
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: integration-source-${{ github.sha }}
          path: integration-source-snapshot.tar.gz
          if-no-files-found: error
