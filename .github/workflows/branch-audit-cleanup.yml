name: One-time branch inventory

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: one-time-branch-inventory
  cancel-in-progress: false

jobs:
  inventory:
    if: ${{ !contains(github.event.head_commit.message, '[skip branch-audit]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Build exact branch inventory
        shell: bash
        run: |
          set -Eeuo pipefail
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          python - <<'PY'
          from __future__ import annotations

          import datetime as dt
          import json
          import subprocess
          from pathlib import Path

          def run(*args: str, check: bool = True) -> subprocess.CompletedProcess[str]:
              return subprocess.run(
                  args,
                  check=check,
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
              )

          refs = run(
              "git",
              "for-each-ref",
              "--format=%(refname:strip=3)\t%(objectname)",
              "refs/remotes/origin",
          ).stdout.splitlines()
          branches: list[tuple[str, str]] = []
          for row in refs:
              name, sha = row.split("\t", 1)
              if name != "HEAD":
                  branches.append((name, sha))
          branches.sort()

          main_sha = run("git", "rev-parse", "origin/main").stdout.strip()
          main_tree = run("git", "rev-parse", "origin/main^{tree}").stdout.strip()
          items: list[dict[str, object]] = []
          for name, sha in branches:
              left, right = run(
                  "git",
                  "rev-list",
                  "--left-right",
                  "--count",
                  f"origin/main...origin/{name}",
              ).stdout.strip().split()
              merge_tree = run(
                  "git",
                  "merge-tree",
                  "--write-tree",
                  "origin/main",
                  f"origin/{name}",
                  check=False,
              )
              items.append(
                  {
                      "name": name,
                      "sha": sha,
                      "ahead_by": int(right),
                      "behind_by": int(left),
                      "merge_tree_equals_main": (
                          merge_tree.returncode == 0
                          and merge_tree.stdout.strip() == main_tree
                      ),
                      "merge_tree_error": (
                          "" if merge_tree.returncode == 0 else merge_tree.stderr.strip()
                      ),
                      "tip_subject": run(
                          "git", "show", "-s", "--format=%s", f"origin/{name}"
                      ).stdout.strip(),
                  }
              )

          payload = {
              "generated_at_utc": dt.datetime.now(dt.UTC).isoformat(),
              "main_sha": main_sha,
              "branch_count": len(items),
              "branches": items,
          }
          target = Path(".github/branch-audit-result.json")
          target.write_text(
              json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True))
          PY

      - name: Publish inventory to main
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/branch-audit-result.json
          git commit -m "[skip branch-audit] Record exact branch inventory"
          git push origin HEAD:main
