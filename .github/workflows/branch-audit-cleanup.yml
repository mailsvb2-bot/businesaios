name: One-time branch cleanup

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: one-time-branch-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    if: ${{ !contains(github.event.head_commit.message, '[skip branch-cleanup]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify audited inventory and delete every non-main branch
        shell: bash
        run: |
          set -Eeuo pipefail

          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'

          mapfile -t expected < <(
            python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('.github/branch-audit-result.json').read_text(encoding='utf-8'))
          for item in sorted(payload['branches'], key=lambda row: row['name']):
              print(item['name'])
          PY
          )
          mapfile -t live < <(
            git ls-remote --heads origin \
              | awk '{sub("refs/heads/", "", $2); print $2}' \
              | sort
          )

          printf '%s\n' "${expected[@]}" > /tmp/expected-branches.txt
          printf '%s\n' "${live[@]}" > /tmp/live-branches.txt
          echo "AUDITED_BRANCH_COUNT=${#expected[@]}"
          echo "LIVE_BRANCH_COUNT=${#live[@]}"

          if ! diff -u /tmp/expected-branches.txt /tmp/live-branches.txt; then
            echo "Live refs changed after the audited inventory; refusing cleanup."
            exit 1
          fi
          if ((${#live[@]} != 40)); then
            echo "Expected the audited 40 branches before cleanup."
            exit 1
          fi

          deleted=()
          failed=()
          for branch in "${live[@]}"; do
            [[ "$branch" == "main" ]] && continue
            echo "DELETE_BRANCH=$branch"
            if git push origin --delete "$branch"; then
              deleted+=("$branch")
            else
              failed+=("$branch")
            fi
          done

          echo "DELETED_BRANCH_COUNT=${#deleted[@]}"
          printf 'DELETED_BRANCH=%s\n' "${deleted[@]}"
          if ((${#failed[@]} > 0)); then
            echo "FAILED_BRANCH_COUNT=${#failed[@]}"
            printf 'FAILED_BRANCH=%s\n' "${failed[@]}"
            exit 1
          fi

          mapfile -t after < <(
            git ls-remote --heads origin \
              | awk '{sub("refs/heads/", "", $2); print $2}' \
              | sort
          )
          echo "FINAL_BRANCH_COUNT=${#after[@]}"
          printf 'FINAL_BRANCH=%s\n' "${after[@]}"

          if ((${#after[@]} != 1)) || [[ "${after[0]}" != "main" ]]; then
            echo "Cleanup invariant failed: expected only main."
            exit 1
          fi

      - name: Remove one-time audit artifacts from main
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/branch-audit-cleanup.yml .github/branch-audit-result.json
          git commit -m "[skip branch-cleanup] Remove one-time branch audit artifacts"
          git push origin HEAD:main
