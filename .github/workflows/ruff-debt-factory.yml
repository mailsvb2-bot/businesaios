name: Guarded Ruff Debt Factory

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Debt factory runner to execute"
        required: true
        default: "typing-compat"
        type: choice
        options:
          - typing-compat
      branch_name:
        description: "Output branch for successful debt-reduction patch"
        required: true
        default: "debt/ruff-typing-compat"
        type: string
      open_pr:
        description: "Open or update a pull request after successful full gate"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - "debt/ruff-factory-trigger/**"
    paths:
      - ".github/ruff-debt-factory-trigger.txt"
      - ".github/workflows/ruff-debt-factory.yml"

permissions:
  contents: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  guarded-ruff-debt-factory:
    name: Run guarded Ruff debt factory
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'chore: reduce Ruff debt via guarded factory') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve workflow parameters
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "FACTORY_RUNNER=${{ inputs.runner }}" >> "$GITHUB_ENV"
            echo "FACTORY_BRANCH=${{ inputs.branch_name }}" >> "$GITHUB_ENV"
            echo "FACTORY_OPEN_PR=${{ inputs.open_pr }}" >> "$GITHUB_ENV"
          else
            echo "FACTORY_RUNNER=typing-compat" >> "$GITHUB_ENV"
            echo "FACTORY_BRANCH=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "FACTORY_OPEN_PR=true" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          fi
          python -m pip install ruff pytest pytest-asyncio httpx

      - name: Record baseline
        run: |
          git rev-parse HEAD | tee baseline_commit.txt
          git status --short
          python -m ruff check . > ruff_before.txt 2>&1 || true
          grep -E "Found [0-9]+ errors" ruff_before.txt || true

      - name: Run guarded factory
        id: factory
        run: |
          set -euo pipefail
          case "${FACTORY_RUNNER}" in
            typing-compat)
              python -m scripts.maintenance.ruff_debt_factory_typing_compat
              ;;
            *)
              echo "Unknown runner: ${FACTORY_RUNNER}" >&2
              exit 2
              ;;
          esac

      - name: Verify full gate after factory
        run: |
          python -m scripts.ci.cli --gate full

      - name: Record after report
        if: success()
        run: |
          python -m ruff check . > ruff_after.txt 2>&1 || true
          grep -E "Found [0-9]+ errors" ruff_after.txt || true
          git status --short

      - name: Stop if no code changes
        if: success()
        run: |
          if git diff --quiet; then
            echo "No debt-reduction changes produced."
            echo "NO_CHANGES=1" >> "$GITHUB_ENV"
          else
            echo "NO_CHANGES=0" >> "$GITHUB_ENV"
          fi

      - name: Commit and push branch
        if: success() && env.NO_CHANGES == '0'
        run: |
          set -euo pipefail
          BRANCH="${FACTORY_BRANCH}"
          git switch -C "$BRANCH"
          git add -A
          git commit -m "chore: reduce Ruff debt via guarded factory"
          git push --force-with-lease origin "$BRANCH"

      - name: Open or update PR
        if: success() && env.NO_CHANGES == '0' && env.FACTORY_OPEN_PR == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="${FACTORY_BRANCH}"
          TITLE="chore: reduce Ruff debt via guarded factory"
          BODY_FILE="pr_body.md"
          {
            echo "## Guarded Ruff debt factory"
            echo
            echo "Runner: \`${FACTORY_RUNNER}\`"
            echo "Branch: \`$BRANCH\`"
            echo
            echo "Safety constraints:"
            echo "- full gate passed before PR creation"
            echo "- unsafe Ruff fixes disabled"
            echo "- F401 autofix disabled"
            echo "- public API export contract remains under tests/contracts"
            echo
            echo "Artifacts generated in workflow workspace:"
            echo "- ruff_before.txt"
            echo "- ruff_after.txt"
            echo "- artifacts/ci/ruff_typing_factory/summary.json"
          } > "$BODY_FILE"
          EXISTING_PR="$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number // empty')"
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --title "$TITLE" --body-file "$BODY_FILE"
            echo "Updated PR #$EXISTING_PR"
          else
            gh pr create --base main --head "$BRANCH" --title "$TITLE" --body-file "$BODY_FILE"
          fi

      - name: Upload debt factory artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-debt-factory-${{ env.FACTORY_RUNNER }}
          path: |
            ruff_before.txt
            ruff_after.txt
            baseline_commit.txt
            artifacts/ci/ruff_typing_factory/**
          if-no-files-found: ignore
