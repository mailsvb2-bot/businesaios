name: Wave 36 Release Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/wave36-release-diagnostic.yml'

permissions:
  actions: read
  contents: read

jobs:
  print-original-release-failure:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print isolated original pytest failure
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: '29905277261'
        run: |
          set -Eeuo pipefail
          gh run view "$FAILED_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --log-failed \
            > original-release-failed.log
          echo '=== WAVE36_ORIGINAL_PYTEST_FAILURE_LINES ==='
          grep -nE 'FAILURES|FAILED|AssertionError|short test summary|E[[:space:]]+assert|coverage pytest run failed|returncode=1' \
            original-release-failed.log \
            | tail -n 160 \
            || true
