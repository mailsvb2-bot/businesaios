name: Wave 36 Release Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/wave36-release-diagnostic.yml'

permissions:
  contents: read

jobs:
  reproduce-unit-coverage:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: 3d5d7f2cdefba416bf38595ada92c7fb86e87204
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install exact release dependencies
        run: |
          set -Eeuo pipefail
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install --require-hashes -r requirements.release.lock.txt

      - name: Reproduce exact unit coverage shard
        run: |
          set -uo pipefail
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTHONNOUSERSITE=1 \
            .venv/bin/python -m scripts.ci.coverage_pytest_runner \
            -p pytest_asyncio.plugin \
            -q tests/unit \
            -m 'not slow and not gate' \
            > unit-coverage-shard.log 2>&1
          STATUS=$?
          echo "=== WAVE36_UNIT_COVERAGE_EXIT=$STATUS ==="
          tail -n 220 unit-coverage-shard.log
          exit 0
