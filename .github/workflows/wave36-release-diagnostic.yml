name: Wave 36 Release Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/wave36-release-diagnostic.yml'

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  summarize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download failed Deep Release evidence
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: '29905277261'
          ARTIFACT_NAME: deep-release-3d5d7f2cdefba416bf38595ada92c7fb86e87204
        run: |
          set -Eeuo pipefail
          mkdir -p diagnostic
          gh run download "$FAILED_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "$ARTIFACT_NAME" \
            --dir diagnostic

      - name: Publish bounded failure summary
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -Eeuo pipefail
          SUMMARY="$(find diagnostic -type f -name 'release.failure-summary.txt' -print -quit)"
          REPORT="$(find diagnostic -type f -name 'release.report.json' -print -quit)"
          test -n "$SUMMARY"
          {
            echo '### Wave 36 Deep Release diagnostic'
            echo
            echo '```text'
            sed -n '1,120p' "$SUMMARY"
            echo '```'
            if [ -n "$REPORT" ]; then
              echo
              echo '<details><summary>Failed report step</summary>'
              echo
              echo '```json'
              jq '{gate, success, failed_steps: [.steps[] | select(.status == "failed")]}' "$REPORT"
              echo '```'
              echo '</details>'
            fi
          } > diagnostic-comment.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file diagnostic-comment.md
