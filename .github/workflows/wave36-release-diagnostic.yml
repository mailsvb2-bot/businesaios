name: Wave 36 Release Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/wave36-release-diagnostic.yml'

permissions:
  actions: read
  contents: read

jobs:
  print-original-release-failure:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print exact original multiprocessing traceback
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: '29905277261'
        run: |
          set -Eeuo pipefail
          gh run view "$FAILED_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --log-failed \
            > original-release-failed.log
          echo '=== WAVE36_ORIGINAL_MULTIPROCESS_TRACEBACK ==='
          sed -n '286,322p' original-release-failed.log
