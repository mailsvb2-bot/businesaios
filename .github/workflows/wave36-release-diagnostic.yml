name: Wave 36 Release Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/wave36-release-diagnostic.yml'

permissions:
  contents: read

jobs:
  reproduce-unit-coverage:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: 3d5d7f2cdefba416bf38595ada92c7fb86e87204
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install exact release dependencies
        run: |
          set -Eeuo pipefail
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip >/dev/null
          .venv/bin/python -m pip install --require-hashes -r requirements.release.lock.txt >/dev/null

      - name: Reproduce exact unit coverage shard
        run: |
          set -uo pipefail
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTHONNOUSERSITE=1 \
            .venv/bin/python -m scripts.ci.coverage_pytest_runner \
            -p pytest_asyncio.plugin \
            -q tests/unit \
            -m 'not slow and not gate' \
            > unit-coverage-shard.log 2>&1
          STATUS=$?
          printf '%s\n' "$STATUS" > unit-coverage-status.txt
          exit 0

      - name: Upload bounded unit shard evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: wave36-unit-shard-evidence
          path: |
            unit-coverage-shard.log
            unit-coverage-status.txt
          if-no-files-found: error

  print-unit-coverage-tail:
    needs: reproduce-unit-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download bounded unit shard evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: wave36-unit-shard-evidence
          path: diagnostic

      - name: Print exact failure tail
        run: |
          set -Eeuo pipefail
          echo "=== WAVE36_UNIT_COVERAGE_EXIT=$(cat diagnostic/unit-coverage-status.txt) ==="
          tail -n 220 diagnostic/unit-coverage-shard.log
