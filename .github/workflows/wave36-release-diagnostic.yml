name: Wave 36 Release Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/wave36-release-diagnostic.yml'

permissions:
  actions: read
  contents: read

jobs:
  summarize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download failed Deep Release evidence
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: '29905277261'
          ARTIFACT_NAME: deep-release-3d5d7f2cdefba416bf38595ada92c7fb86e87204
        run: |
          set -Eeuo pipefail
          mkdir -p diagnostic
          gh run download "$FAILED_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "$ARTIFACT_NAME" \
            --dir diagnostic

      - name: Print bounded failure summary
        run: |
          set -Eeuo pipefail
          SUMMARY="$(find diagnostic -type f -name 'release.failure-summary.txt' -print -quit)"
          REPORT="$(find diagnostic -type f -name 'release.report.json' -print -quit)"
          test -n "$SUMMARY"
          echo '=== WAVE36_RELEASE_FAILURE_SUMMARY ==='
          sed -n '1,120p' "$SUMMARY"
          if [ -n "$REPORT" ]; then
            echo '=== WAVE36_RELEASE_FAILED_STEP_JSON ==='
            jq -c '{gate, success, failed_steps: [.steps[] | select(.status == "failed")]}' "$REPORT"
          fi
