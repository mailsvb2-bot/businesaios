name: Full CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - canon-p0-architecture-boundary-pack
  pull_request:

jobs:
  full-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install locked dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.lock.txt
      - name: Run canonical full CI gate
        env:
          BAIOS_BOOT_SMOKE_ROOT: ${{ runner.temp }}/businesaios-boot-smoke/${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-3.12
        run: python -m scripts.ci.cli --gate full
      - name: Upload full gate artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: full-ci-artifacts
          path: artifacts/ci
          if-no-files-found: warn
