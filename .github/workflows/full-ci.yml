name: Full CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - canon-p0-architecture-boundary-pack
  pull_request:

jobs:
  full-gate:
    runs-on: [self-hosted, linux, x64, businesaios]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install locked dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.lock.txt
      - name: Run canonical full CI gate
        env:
          BAIOS_BOOT_SMOKE_ROOT: ${{ runner.temp }}/businesaios-boot-smoke/${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-3.12
        run: python -m scripts.ci.cli --gate full
