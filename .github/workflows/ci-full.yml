name: ci-full
on:
  push:
  pull_request:
jobs:
  full-311:
    runs-on: [self-hosted, linux, x64, businesaios]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock.txt
      - run: python scripts/ci/check_requirements_lock.py
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.lock.txt
      - run: python -m scripts.ci.cli --gate full
  full-312:
    runs-on: [self-hosted, linux, x64, businesaios]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock.txt
      - run: python scripts/ci/check_requirements_lock.py
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.lock.txt
      - run: python -m scripts.ci.cli --gate full
