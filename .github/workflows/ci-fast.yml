name: ci-fast
on:
  push:
  pull_request:
jobs:
  fast:
    runs-on: [self-hosted, linux, x64, businesaios]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements.lock.txt
      - run: python scripts/ci/check_requirements_lock.py
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.lock.txt
      - name: Run canonical fast CI gate
        env:
          BAIOS_BOOT_SMOKE_ROOT: ${{ runner.temp }}/businesaios-boot-smoke/${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}-${{ matrix.python-version }}
        run: python -m scripts.ci.cli --gate fast
      - name: Upload fast gate artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ci-fast-${{ matrix.python-version }}-artifacts
          path: artifacts/ci
          if-no-files-found: warn
