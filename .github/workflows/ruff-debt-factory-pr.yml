name: PR Guarded Ruff Debt Factory

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/ruff-debt-factory-trigger.txt"
      - "scripts/maintenance/ruff_debt_factory_typing_compat.py"
      - "tools/ruff_debt_factory_typing_compat.py"

permissions:
  contents: write
  pull-requests: write

jobs:
  guarded-typing-factory:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.title, '[skip-factory]') }}

    steps:
      - name: Checkout PR/head branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          python -m pip install ruff pytest pytest-asyncio httpx

      - name: Baseline Ruff report
        run: |
          python -m ruff check . > ruff_before.txt 2>&1 || true
          grep -E "Found [0-9]+ errors" ruff_before.txt || true

      - name: Run guarded typing factory
        run: |
          python -m scripts.maintenance.ruff_debt_factory_typing_compat

      - name: Verify full gate
        run: |
          python -m scripts.ci.cli --gate full

      - name: After Ruff report
        if: success()
        run: |
          python -m ruff check . > ruff_after.txt 2>&1 || true
          grep -E "Found [0-9]+ errors" ruff_after.txt || true
          git status --short

      - name: Commit and push factory patch
        if: success()
        run: |
          if git diff --quiet; then
            echo "No debt-reduction changes produced."
            exit 0
          fi
          BRANCH="${{ github.head_ref || github.ref_name }}"
          git add -A
          git commit -m "chore: reduce Ruff typing debt via guarded factory"
          git push origin "HEAD:$BRANCH"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-debt-factory-pr
          path: |
            ruff_before.txt
            ruff_after.txt
            artifacts/ci/ruff_typing_factory/**
          if-no-files-found: ignore
