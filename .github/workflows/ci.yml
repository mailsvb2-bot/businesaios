name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify dependency lock
        run: python scripts/ci/check_requirements_lock.py
      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt
      - name: Run canonical business-critical CI gate
        run: python -m scripts.ci.cli --gate business-critical
      - name: Upload business-critical gate artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-${{ matrix.python-version }}-artifacts
          path: artifacts/ci
          if-no-files-found: warn
