name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify dependency lock
        run: python scripts/ci/check_requirements_lock.py
      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt
      - name: Run canonical business-critical CI gate
        run: python -m scripts.ci.cli --gate business-critical
      - name: Upload business-critical gate artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ci-${{ matrix.python-version }}-artifacts
          path: artifacts/ci
          if-no-files-found: warn
