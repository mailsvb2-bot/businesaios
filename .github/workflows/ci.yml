name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: [self-hosted, linux, x64, businesaios]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python scripts/ci/check_requirements_lock.py
      - run: python -m pip install --upgrade pip && python -m pip install -r requirements.lock.txt
      - run: python -m scripts.ci.cli --gate business-critical
      - if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ci-${{ matrix.python-version }}-artifacts
          path: artifacts/ci
          if-no-files-found: warn
