name: targeted-domain-ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  targeted-domain-ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify dependency lock
        run: python scripts/ci/check_requirements_lock.py
      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt
      - name: Fetch main ref for targeted diff
        run: git fetch --no-tags --prune origin main
      - name: Run targeted domain CI
        env:
          TARGETED_CI_BASE: origin/main
        run: python -m scripts.ci.cli --gate targeted-domain
      - name: Upload targeted-domain artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: targeted-domain-${{ matrix.python-version }}-artifacts
          path: artifacts/ci
          if-no-files-found: warn
