name: targeted-domain-ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  targeted-domain-ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify exact checkout
        env:
          EXPECTED_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify dependency lock
        run: python scripts/ci/check_requirements_lock.py
      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt
      - name: Fetch main ref for targeted diff
        run: git fetch --no-tags --prune origin main
      - name: Run targeted domain CI
        env:
          TARGETED_CI_BASE: origin/main
        run: python -m scripts.ci.cli --gate targeted-domain
      - name: Upload targeted-domain artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: targeted-domain-${{ matrix.python-version }}-artifacts
          path: artifacts/ci
          if-no-files-found: warn
