name: targeted-domain-ci

on:
  push:
  pull_request:

jobs:
  targeted-domain-ci:
    runs-on: [self-hosted, linux, x64, businesaios]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Verify dependency lock
        run: python scripts/ci/check_requirements_lock.py
      - name: Install locked dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt
      - name: Fetch base ref for targeted diff
        run: git fetch --no-tags --prune origin ${{ github.base_ref || 'main' }}
      - name: Run targeted domain CI
        env:
          TARGETED_CI_BASE: origin/${{ github.base_ref || 'main' }}
        run: python -m scripts.ci.cli --gate targeted-domain
