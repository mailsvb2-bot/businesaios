name: docker-image
on:
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - docker/**
      - requirements.txt
      - requirements.lock.txt
      - requirements.release.lock.txt
      - scripts/ci/check_requirements_lock.py
      - .github/workflows/docker-image.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - docker/**
      - requirements.txt
      - requirements.lock.txt
      - requirements.release.lock.txt
      - scripts/ci/check_requirements_lock.py
      - .github/workflows/docker-image.yml
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify dependency lock
        run: python scripts/ci/check_requirements_lock.py
      - name: Build Docker image
        run: docker build --pull -t businesaios:ci .
