name: docker-image

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Dockerfile
      - docker/**
      - requirements.txt
      - requirements.lock.txt
      - requirements.release.lock.txt
      - scripts/ci/check_requirements_lock.py
      - .github/workflows/docker-image.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - docker/**
      - requirements.txt
      - requirements.lock.txt
      - requirements.release.lock.txt
      - scripts/ci/check_requirements_lock.py
      - .github/workflows/docker-image.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_BASE_IMAGE_SOURCE: python:3.12-slim@sha256:57cd7c3a7a273101a6485ba99423ee568157882804b1124b4dd04266317710de
  PYTHON_BASE_IMAGE_LOCAL: businesaios/python-runtime-base:3.12-slim

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Verify exact checkout
        env:
          EXPECTED_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Verify dependency lock
        run: python scripts/ci/check_requirements_lock.py

      - name: Prepare vetted local Python base image
        run: |
          set -Eeuo pipefail
          docker pull "$PYTHON_BASE_IMAGE_SOURCE"
          docker tag "$PYTHON_BASE_IMAGE_SOURCE" "$PYTHON_BASE_IMAGE_LOCAL"

      - name: Build Docker image
        run: >-
          docker build --pull=false
          --build-arg PYTHON_BASE_IMAGE="$PYTHON_BASE_IMAGE_LOCAL"
          -t businesaios:ci .
