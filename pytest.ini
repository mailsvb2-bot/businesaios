[pytest]
# Default: all tests. For fast CI use: pytest -m "not slow and not integration". Full CI runs all.
minversion = 7.0

# Keep existing hermetic opts + add strictness.
addopts = --strict-markers --strict-config
  -p no:cacheprovider
  -p no:ddtrace
  -q
  --strict-markers
  --strict-config
  -ra

# Async tests are first-class tests. They must execute, not disappear as
# pytest collection skips/warnings when plugin autoload is disabled in CI.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

testpaths =
  tests

python_files =
  test_*.py
python_classes =
  Test*
python_functions =
  test_*

filterwarnings =
  # Hermetic suppressions
  ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning
  ignore:.*swap memory stats couldn't be determined.*:RuntimeWarning
  ignore:.*\/proc\/vmstat.*:RuntimeWarning
  # Make async collection loss fail closed.
  error:.*async def function and no async plugin installed.*:pytest.PytestUnhandledCoroutineWarning
  # Make deprecations loud (locks regressions early)
  error::DeprecationWarning
  error::PendingDeprecationWarning
  ignore::UserWarning
  ignore::RuntimeWarning

markers =
  asyncio: async test marker executed by pytest-asyncio
  gate: CI-only certification / release gate
  lock: Contract/architecture lock tests (must never be skipped in CI)
  slow: Long running tests
  integration: marks integration tests that exercise cross-module or external contours
  arch: marks architecture tests that protect dependency and layering rules
  e2e: end-to-end tests that exercise the full headless closed loop
